name: Publish
run-name: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'Dry Run' || 'Publish' }}

on:
    release:
        types: [released]
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Run without publishing to npm"
                type: boolean
                default: false

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 9
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm run lint
            - run: pnpm run format:check
            - run: pnpm test

    publish:
        needs: [lint]
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  registry-url: "https://registry.npmjs.org"
            - run: npm install -g npm@latest
            - run: npm publish --ignore-scripts --access public ${{ inputs.dry_run && '--dry-run' || '' }}
